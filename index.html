<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Cliente</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    .header {
      background: #4f46e5;
      color: white;
      padding: 30px 40px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .header p {
      opacity: 0.9;
      font-size: 0.95rem;
    }

    .form-container {
      padding: 40px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #374151;
      font-weight: 500;
      font-size: 0.95rem;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .row {
      display: flex;
      gap: 20px;
    }

    .row > div {
      flex: 1;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 12px;
    }

    button:hover {
      background: #4338ca;
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
    }

    .terms {
      margin-top: 24px;
      text-align: center;
      font-size: 0.85rem;
      color: #6b7280;
    }

    .terms a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .form-container {
        padding: 30px 24px;
      }
      .row {
        flex-direction: column;
        gap: 0;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Cadastro de Cliente</h1>
      <p>Preencha os dados corretamente</p>
    </div>

    <div class="form-container">
      <form>

        <div class="form-group">
          <label for="nome">Nome completo *</label>
          <input type="text" id="nome" name="nome" required placeholder="Ex: Pedro Silva Santos">
        </div>

        <div class="row">
          <div class="form-group">
            <label for="cpf">CPF *</label>
            <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00">
          </div>
          <div class="form-group">
            <label for="nascimento">Data de nascimento *</label>
            <input type="date" id="nascimento" name="nascimento" required>
          </div>
        </div>

        <div class="row">
          <div class="form-group">
            <label for="email">E-mail *</label>
            <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com">
          </div>
          <div class="form-group">
            <label for="telefone">Telefone / WhatsApp *</label>
            <input type="tel" id="telefone" name="telefone" required placeholder="(41) 99999-9999">
          </div>
        </div>

        <div class="form-group">
          <label for="estado">Estado *</label>
          <select id="estado" name="estado" required>
            <option value="">Selecione...</option>
            <option value="PR">Paraná</option>
            <option value="SC">Santa Catarina</option>
            <option value="SP">São Paulo</option>
            <option value="RS">Rio Grande do Sul</option>
            <!-- pode adicionar os outros estados -->
          </select>
        </div>

        <div class="form-group">
          <label for="endereco">Endereço completo</label>
          <input type="text" id="endereco" name="endereco" placeholder="Rua das Flores, 123 - Centro">
        </div>

        <button type="submit">Cadastrar Cliente</button>

        <div class="terms">
          Ao cadastrar você concorda com nossa 
          <a href="#">Política de Privacidade</a>
        </div>

      </form>
    </div>
  </div>

</body>
</html>
